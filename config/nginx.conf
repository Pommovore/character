# Serveur Nginx Reverse Proxy Config
# Ce bloc peut être inclu dans la configuration server de Nginx

location /character/ {
    # Redirige les requêtes vers le serveur Uvicorn (ATTENTION AU SLASH FINAL qui efface le préfixe partagé)
    proxy_pass http://127.0.0.1:8886/;

    # En-têtes pour que FastAPI connaisse le contexte réel du client
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Indique à FastAPI le préfixe de l'application
    # (indispensable pour que request.scope['root_path'] fonctionne)
    proxy_set_header X-Forwarded-Prefix /character;

    # Support des WebSockets (pour uvicorn si nécessaire)
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Taille max des uploads (augmenter si nécessaire en cas d'URLs massives ou d'imports futurs)
    client_max_body_size 50M;

    # Timeouts généreux pour les extractions LLM longues
    proxy_read_timeout    300s;
    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;
}
